name: trading-system-dev

services:
  postgres:
    image: postgres:16-alpine
    container_name: trading-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-trading}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trading123}
      POSTGRES_DB: ${POSTGRES_DB:-orders}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks:
      - trading_net

  migrate-postgres:
    image: migrate/migrate:v4.18.1
    container_name: trading-migrate-postgres
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations/postgres:/migrations:ro
    command:
      [
        "-path", "/migrations",
        "-database", "postgres://${POSTGRES_USER:-trading}:${POSTGRES_PASSWORD:-trading123}@postgres:5432/${POSTGRES_DB:-orders}?sslmode=disable",
        "up"
      ]
    restart: "no"
    networks:
      - trading_net

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: trading-clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-market}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-trading}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-trading123}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "8123:8123" # HTTP
      - "9000:9000" # Native TCP
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
      - ./init/clickhouse:/docker-entrypoint-initdb.d:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user=$$CLICKHOUSE_USER --password=$$CLICKHOUSE_PASSWORD --query='SELECT 1' > /dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - trading_net

  redis:
    image: redis:7-alpine
    container_name: trading-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "10000"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep -q PONG"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - trading_net

volumes:
  pg_data:
  ch_data:
  ch_logs:
  redis_data:

networks:
  trading_net:
    driver: bridge
